# Maps Orange Paper function names (PascalCase) to Rust paths.
# Used by cargo spec-lock extract-property-tests.
# Canonical implementations live in blvm-primitives; blvm-consensus re-exports them.

[blvm_consensus.serialization]
SerializeTransaction = "blvm_primitives::serialization::serialize_transaction"
DeserializeTransaction = "blvm_primitives::serialization::deserialize_transaction"
SerializeTransactionWithWitness = "blvm_primitives::serialization::serialize_transaction_with_witness"
DeserializeTransactionWithWitness = "blvm_primitives::serialization::deserialize_transaction_with_witness"
SerializeBlockHeader = "blvm_primitives::serialization::serialize_block_header"
SerializeHeader = "blvm_primitives::serialization::serialize_block_header"
DeserializeBlockHeader = "blvm_primitives::serialization::deserialize_block_header"
DeserializeHeader = "blvm_primitives::serialization::deserialize_block_header"
